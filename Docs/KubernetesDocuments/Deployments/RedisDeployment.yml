apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: daprstatestore-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:6
          args: ["--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: daprstatestore-pvc
 
---
apiVersion: v1
kind: Service
metadata:
  name: redis-db
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

    
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight-service 
spec:
  type: LoadBalancer
  ports:
    - port: 9081
      targetPort: 5540
  selector:
    app: redisinsight
    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight 
  labels:
    app: redisinsight 
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: redisinsight
  template: 
    metadata:
      labels:
        app: redisinsight 
    spec:
      containers:
      - name:  redisinsight 
        image: redis/redisinsight:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5540